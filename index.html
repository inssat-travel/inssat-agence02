<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INSSAT | بوابة الشركاء</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        .bg { 
            height: 100vh;
            background: url('bg-login.png') no-repeat center center fixed;
            background-size: cover; /* لضمان تغطية الشاشة بالكامل بدون تكرار */
            display: flex; justify-content: center; align-items: center;
        }
        .box { 
            background: rgba(0,0,0,0.7); padding: 40px; border-radius: 20px; 
            text-align: center; border: 1px solid #d4af37; backdrop-filter: blur(10px);
        }
        input { padding: 15px; border-radius: 10px; border: none; width: 250px; margin-bottom: 15px; }
        button { padding: 15px 40px; background: #d4af37; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="box">
            <h1 style="color:white; margin-top:0;">بوابة INSSAT B2B</h1>
            <input type="password" id="pass" placeholder="كلمة المرور">
            <br>
            <button onclick="check()">دخول</button>
        </div>
    </div>
    <script>
        function check() {
            if(document.getElementById("pass").value === "b2b2026") { window.location.href = "dashboard.html"; }
            else { alert("كلمة مرور خاطئة!"); }
        }
    </script>
</body>
</html>
