<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>INSSAT | الخدمات</title>
    <style>
        body { 
            margin: 0; padding: 40px; 
            background: url('bg-dash.jpg') no-repeat center center fixed; 
            background-size: cover; /* قياس الصورة 1920x1080 سيتناسب هنا تماماً */
            color: white; font-family: sans-serif;
        }
        h1 { text-align: center; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; }
        
        /* الـ Grid المخصص لعرض الصور بشكل متناسق ومستجيب للشاشات */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
            margin-top: 30px; 
        }
        
        /* بطاقة الصورة */
        .card { 
            background: rgba(0,0,0,0.7); 
            padding: 10px; 
            border-radius: 15px; 
            border: 1px solid #d4af37; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: scale(1.03); /* تأثير حركي خفيف عند تمرير الماوس فوق الصورة */
        }
        
        /* تنسيق الصور لتملأ البطاقة بالكامل وتكون متناسقة */
        .card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        .btn-dl { display: block; width: 250px; margin: 40px auto; padding: 20px; background: #d4af37; text-align: center; text-decoration: none; color: white; font-weight: bold; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>الخدمات المتاحة للشركاء</h1>
    
    <div class="grid">
        
        <div class="card">
            <img src="1.jpg" alt="خدمة 1">
        </div>

        <div class="card">
            <img src="2.jpg" alt="خدمة 2">
        </div>

        <div class="card">
            <img src="3.jpg" alt="خدمة 3">
        </div>

        <div class="card">
            <img src="4.jpg" alt="خدمة 4">
        </div>

        <div class="card">
            <img src="5.jpg" alt="خدمة 5">
        </div>

        <div class="card">
            <img src="6.jpg" alt="خدمة 6">
        </div>

        <div class="card">
            <img src="7.jpg" alt="خدمة 7">
        </div>

        <div class="card">
            <img src="8.jpg" alt="خدمة 8">
        </div>

        <div class="card">
            <img src="9.jpg" alt="خدمة 9">

        <div class="card">

        <div class="card">

        </div>
    
    <a href="catalog.pdf" class="btn-dl">تحميل الكتالوج الكامل</a>
</body>
</html>
